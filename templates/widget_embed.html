<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Widget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
        }

        .widget-container {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            padding: 24px 20px;
            color: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            height: 100%;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .widget-city {
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .widget-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .widget-temp {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .widget-temp-unit {
            font-size: 1.5rem;
            font-weight: 600;
            opacity: 0.7;
        }

        .widget-icon {
            width: 70px;
            height: 70px;
        }

        .widget-desc {
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .widget-details {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
        }

        .widget-detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            opacity: 0.85;
        }

        .widget-detail-item i {
            font-size: 0.9rem;
        }

        .widget-footer {
            margin-top: 10px;
            font-size: 0.65rem;
            opacity: 0.5;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-city">
            <i class="fas fa-map-pin"></i> {{ weather.city }}, {{ weather.country }}
        </div>
        <div class="widget-main">
            <div>
                <div class="widget-temp">
                    {{ weather.temperature }}<span class="widget-temp-unit">°C</span>
                </div>
                <div class="widget-desc">{{ weather.description }}</div>
            </div>
            <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@4x.png" alt="{{ weather.description }}" class="widget-icon">
        </div>
        <div class="widget-details">
            <span class="widget-detail-item"><i class="fas fa-water"></i> {{ weather.humidity }}%</span>
            <span class="widget-detail-item"><i class="fas fa-wind"></i> {{ weather.wind_speed }} km/h</span>
            <span class="widget-detail-item"><i class="fas fa-temperature-high"></i> {{ weather.feels_like }}°C</span>
        </div>
        <div class="widget-footer">Powered by Weather App</div>
    </div>
</body>
</html>
